<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krimidinner Test Page</title>
    <style>
        :root {
            --primary-bg: #0f0f12;
            --accent-red: #e63946;
            --text-gold: #d4af37;
            --text-light: #f1f1f1;
            --glass-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--primary-bg);
            color: var(--text-light);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(230, 57, 70, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(212, 175, 55, 0.05) 0%, transparent 40%);
        }

        .container {
            text-align: center;
            padding: 3rem;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 1s ease-out;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            color: var(--accent-red);
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(230, 57, 70, 0.4);
        }

        p {
            font-size: 1.2rem;
            color: var(--text-gold);
            opacity: 0.8;
            margin-bottom: 2rem;
        }

        .status-badge {
            display: inline-block;
            padding: 8px 16px;
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
            border-radius: 99px;
            font-size: 0.9rem;
            font-weight: 600;
            border: 1px solid rgba(46, 204, 113, 0.3);
            margin-top: 1rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .blood-drip {
            position: absolute;
            top: 0;
            left: 50%;
            width: 2px;
            height: 0;
            background: var(--accent-red);
            animation: drip 2s forwards;
            animation-delay: 0.5s;
        }

        @keyframes drip {
            to { height: 100px; }
        }
    </style>
</head>
<body>
    <div class="blood-drip"></div>
    <div class="container">
        <h1>Krimidinner</h1>
        <p>Investigation in Progress...</p>
        <div class="test-content">
            <p style="color: var(--text-light); font-weight: 300;">This is a test file generated by Antigravity.</p>
            <div class="status-badge">System Online</div>
        </div>
    </div>
</body>
</html>
